name: "AI Training CI/CD"

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động train lúc 0:00 midnight (UTC) hàng ngày
  workflow_dispatch: # Cho phép kích hoạt bằng tay trên GitHub interface

jobs:
  train-rl-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quyền tạo commit và đẩy file Model mới lên nhánh
      actions: write # Quyền kích hoạt lại chính workflow này
      
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      
    - name: Setup Python 3.10 Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Self-Play Training Loop
      # Đặt số timestep cực lớn để loop vĩnh viễn, script sẽ tự nhận diện tắt an toàn khi chạm mốc 5.5 hours
      run: |
        python scripts/train.py --timesteps 1000000000 --time-limit 5.5
        
    - name: Auto-Commit & Save Model Checkpoint
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Auto-checkpoint: Trí nhớ AI vừa được cập nhật thêm 200k steps"
        file_pattern: "trained_models/best_agent.zip trained_models/checkpoints/*.zip"
        branch: main
        
    - name: Trigger next training cycle
      if: success() # Chỉ kích hoạt tiếp nếu session này không bị lỗi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Kích hoạt vòng lặp Training tiếp theo 🚀"
        gh workflow run autosave_training.yml
